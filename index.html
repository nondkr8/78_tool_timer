<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタムタイマー Final Fix</title>
    <style>
        :root {
            --title-font: "Meiryo", sans-serif;
            --timer-font: "Arial Black", sans-serif;
            /* メインのピンク系カラーを定義 */
            --accent-pink: #db7093; 
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: #f8f8f8;
            overflow: hidden;
        }

        /* 左側：表示エリア */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            transition: background 0.3s ease;
        }

        #title-display { 
            margin-bottom: 20px; 
            text-align: center;
            font-family: var(--title-font);
            white-space: pre-wrap;
        }
        #timer-display { 
            line-height: 1; 
            text-align: center; 
            user-select: none;
            font-family: var(--timer-font);
        }

        /* 右側：設定パネル */
        .controls-panel {
            width: 340px;
            height: 100vh;
            background-color: #f5f5f5;
            border-left: 1px solid #ddd;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        h2 { color: var(--accent-pink); font-size: 18px; margin: 0 0 15px 0; border-bottom: 2px solid var(--accent-pink); padding-bottom: 5px; }

        .section-title {
            background-color: #eee;
            border-left: 4px solid var(--accent-pink);
            padding: 4px 8px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .setting-group { margin-bottom: 25px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; }
        .input-row div { flex: 1; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 2px; }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
            background-color: white;
        }

        /* 入力欄フォーカス時の枠線もピンクに */
        input:focus, select:focus {
            outline: 2px solid var(--accent-pink);
            border-color: transparent;
        }

        /* 【重要】チェックボックスの色を#db7093に変更 */
        input[type="checkbox"] {
            accent-color: var(--accent-pink);
            cursor: pointer;
            width: 16px;
            height: 16px;
            vertical-align: middle;
        }

        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .time-grid div { text-align: center; font-size: 10px; }

        .btn-main {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--accent-pink);
            color: white;
            box-shadow: 0 4px 0 #b35272; /* 少し暗めのピンク */
            transition: 0.1s;
            margin-bottom: 10px;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #b35272; }

        .sub-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-sub { padding: 8px; border-radius: 4px; border: none; background: #666; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-start { background: #28a745; }
        .btn-stop { background: #dc3545; }
    </style>
</head>
<body>

    <datalist id="font-list">
        <option value="Meiryo">
        <option value="Yu Gothic">
        <option value="MS PGothic">
        <option value="HG丸ｺﾞｼｯｸM-PRO">
        <option value="HG行書体">
        <option value="Hiragino Kaku Gothic ProN">
        <option value="ビルの谷間と高架下 フリー版">
        <option value="Arial Black">
        <option value="Impact">
        <option value="Courier New">
    </datalist>

    <div class="main-display" id="canvas">
        <div id="title-display"></div>
        <div id="timer-display">00:00</div>
    </div>

    <div class="controls-panel">
        <h2>カスタム設定</h2>

        <div class="setting-group">
            <div class="section-title">背景設定</div>
            <label>ファイル選択</label>
            <input type="file" id="bg-upload" accept="image/*">
        </div>

        <div class="setting-group">
            <div class="section-title">題名設定</div>
            <label>タイトルの文字設定（内容）</label>
            <input type="text" id="title-input" placeholder="投票時間" oninput="applyStyles()">
            
            <div class="input-row">
                <div style="flex: 2;">
                    <label>フォント（入力/選択）</label>
                    <input type="text" id="title-font" list="font-list" value="Meiryo" oninput="applyStyles()" onfocus="this.value=''">
                </div>
                <div>
                    <label>サイズ(px)</label>
                    <input type="number" id="title-size" value="60" oninput="applyStyles()">
                </div>
            </div>
            <div class="input-row">
                <input type="color" id="title-color" value="#333333" oninput="applyStyles()">
                <label style="font-size:12px;"><input type="checkbox" id="title-bold" onchange="applyStyles()"> 太字</label>
            </div>
        </div>

        <div class="setting-group">
            <div class="section-title">タイマー設定</div>
            <label>タイマーの文字設定</label>
            <div class="input-row">
                <div style="flex: 2;">
                    <label>フォント</label>
                    <input type="text" id="timer-font" list="font-list" value="Arial Black" oninput="applyStyles()" onfocus="this.value=''">
                </div>
                <div>
                    <label>サイズ(px)</label>
                    <input type="number" id="timer-size" value="150" oninput="applyStyles()">
                </div>
            </div>
            <div class="input-row">
                <input type="color" id="timer-color" value="#000000" oninput="applyStyles()">
                <label style="font-size:12px;"><input type="checkbox" id="timer-bold" checked onchange="applyStyles()"> 太字</label>
            </div>

            <label style="margin-top:15px;">時間設定</label>
            <div class="time-grid">
                <div>10分<select id="m10"><script>for(i=0;i<=5;i++)document.write(`<option value="${i}">${i}</option>`)</script></select></div>
                <div>1分<select id="m1"><script>for(i=0;i<=9;i++)document.write(`<option value="${i}">${i}</option>`)</script></select></div>
                <div>10秒<select id="s10"><script>for(i=0;i<=5;i++)document.write(`<option value="${i}">${i}</option>`)</script></select></div>
                <div>1秒<select id="s1"><script>for(i=0;i<=9;i++)document.write(`<option value="${i}">${i}</option>`)</script></select></div>
            </div>
            <button class="btn-main" onclick="setTime()">時間をセットする！</button>
            
            <label>操作ボタン</label>
            <div class="sub-btn-group">
                <button class="btn-sub btn-start" onclick="startTimer()">スタート</button>
                <button class="btn-sub btn-stop" onclick="stopTimer()">ストップ</button>
                <button class="btn-sub" onclick="resetTimer()" style="grid-column: span 2; margin-top:5px;">リセット</button>
            </div>
        </div>
    </div>

    <script>
        let countdown;
        let timeLeft = 0;
        let isRunning = false;

        const canvas = document.getElementById('canvas');
        const titleDisp = document.getElementById('title-display');
        const timerDisp = document.getElementById('timer-display');

        function applyStyles() {
            const tText = document.getElementById('title-input').value;
            titleDisp.innerText = tText;
            titleDisp.style.display = tText === "" ? "none" : "block";
            
            const tFont = document.getElementById('title-font').value || "Meiryo";
            document.documentElement.style.setProperty('--title-font', `"${tFont}", sans-serif`);
            
            const tmFont = document.getElementById('timer-font').value || "Arial Black";
            document.documentElement.style.setProperty('--timer-font', `"${tmFont}", sans-serif`);

            titleDisp.style.fontSize = document.getElementById('title-size').value + 'px';
            titleDisp.style.color = document.getElementById('title-color').value;
            titleDisp.style.fontWeight = document.getElementById('title-bold').checked ? "bold" : "normal";

            timerDisp.style.fontSize = document.getElementById('timer-size').value + 'px';
            timerDisp.style.color = document.getElementById('timer-color').value;
            timerDisp.style.fontWeight = document.getElementById('timer-bold').checked ? "bold" : "normal";
        }

        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => canvas.style.backgroundImage = `url(${ev.target.result})`;
                reader.readAsDataURL(file);
            }
        });

        function setTime() {
            stopTimer();
            timeLeft = (parseInt(document.getElementById('m10').value) * 600) +
                       (parseInt(document.getElementById('m1').value) * 60) +
                       (parseInt(document.getElementById('s10').value) * 10) +
                       (parseInt(document.getElementById('s1').value));
            updateDisplay();
        }

        function startTimer() {
            if (isRunning || timeLeft <= 0) return;
            isRunning = true;
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) { clearInterval(countdown); isRunning = false; alert("終了しました！"); }
            }, 1000);
        }

        function stopTimer() { clearInterval(countdown); isRunning = false; }
        function resetTimer() { stopTimer(); timeLeft = 0; updateDisplay(); }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisp.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        applyStyles();
    </script>
</body>
</html>
